symbols:
  "!": extra_information
  "⊗": important
  "?": unclear
  "★": key_concept
  "→": follows_from
rendering:
  extra_information:
    prefix: "> 💡 Extra Information"
    style: "blockquote"
  important:
    prefix: "> ⚠️ Important"
    style: "blockquote"
  unclear:
    prefix: "> ❓ Unclear"
    style: "blockquote"
  key_concept:
    prefix: "> ⭐ Key Concept"
    style: "blockquote"
